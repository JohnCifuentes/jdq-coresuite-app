<div [class]="alertClass">
  <div class="d-flex align-items-start gap-3">
    <span class="material-symbols-outlined status-icon">{{ icon }}</span>

    <div class="flex-grow-1">
      <div class="fw-semibold mb-1">Estado del pago</div>
      <div class="small mb-2">{{ resolvedMessage }}</div>

      <div *ngIf="reference" class="reference-chip">
        Referencia: {{ reference }}
      </div>

      <div *ngIf="busy" class="d-flex align-items-center gap-2 mt-3 text-muted small">
        <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
        Validando información con el backend...
      </div>

      <div class="d-flex flex-wrap gap-2 mt-3">
        <button *ngIf="showRetry" type="button" class="btn btn-outline-primary btn-sm" (click)="retry.emit()">
          Reintentar pago
        </button>
        <button *ngIf="!busy" type="button" class="btn btn-outline-secondary btn-sm" (click)="close.emit()">
          Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
