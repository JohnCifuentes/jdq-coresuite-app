<div class="container-fluid py-4">
  <div class="mb-4">
    <h2 class="fw-bold mb-1">{{ interfazNombre }}</h2>
    <p class="text-muted mb-0">
      {{ interfazDescripcion }}
    </p>
  </div>

  <div *ngIf="loading" class="card shadow-sm border-0">
    <div class="card-body text-center py-5 text-muted">
      Cargando configuración de la interfaz...
    </div>
  </div>

  <div *ngIf="!loading && errorMessage" class="alert alert-warning">
    {{ errorMessage }}
  </div>

  <form *ngIf="!loading && pantalla.length > 0" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div *ngFor="let grupo of pantalla; trackBy: trackByGroupId" class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="d-flex align-items-center gap-2 mb-4 border-bottom pb-3">
          <span class="material-symbols-outlined text-primary">dashboard_customize</span>
          <h5 class="mb-0 section-title">{{ grupo.nombreGrupo }}</h5>
        </div>

        <div class="row g-3">
          <div *ngFor="let campo of grupo.campos; trackBy: trackByFieldId" [class]="getBootstrapColumnClass(campo)">
            <div *ngIf="campo.renderType === 'checkbox'" class="form-check mt-4">
              <input class="form-check-input" type="checkbox" [id]="campo.controlName" [formControlName]="campo.controlName">
              <label [appRequiredField]="campo.controlName" class="form-check-label" [for]="campo.controlName">
                {{ campo.etiqueta }}
              </label>
            </div>

            <ng-container *ngIf="campo.renderType !== 'checkbox'">
              <label [appRequiredField]="campo.controlName" class="form-label">{{ campo.etiqueta }}</label>

              <textarea *ngIf="campo.renderType === 'textarea'" class="form-control" rows="3" [id]="campo.controlName"
                [formControlName]="campo.controlName"></textarea>

              <select *ngIf="campo.renderType === 'select'" class="form-select" [id]="campo.controlName"
                [formControlName]="campo.controlName">
                <option value="">Seleccione...</option>
                <option *ngFor="let option of campo.listaValores" [value]="option.valor">
                  {{ option.descripcion }}
                </option>
              </select>

              <input *ngIf="campo.renderType === 'number'" type="number" class="form-control" [id]="campo.controlName"
                [formControlName]="campo.controlName">

              <input *ngIf="campo.renderType === 'date'" type="date" class="form-control" [id]="campo.controlName"
                [formControlName]="campo.controlName">

              <input *ngIf="campo.renderType === 'text'" type="text" class="form-control" [id]="campo.controlName"
                [formControlName]="campo.controlName">
            </ng-container>

            <div *ngIf="showFieldErrors(campo)" class="text-danger small mt-1">
              {{ getFieldErrorMessage(campo) }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4">
      <button type="button" class="btn btn-outline-secondary" (click)="resetForm()" [disabled]="saving">
        Cancelar
      </button>
      <button type="submit" class="btn btn-primary px-4" [disabled]="form.invalid || saving">
        <span *ngIf="!saving">Guardar</span>
        <span *ngIf="saving">Procesando...</span>
      </button>
    </div>
  </form>
</div>
