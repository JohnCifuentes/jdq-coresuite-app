<div class="rp-wrapper d-flex flex-column min-vh-100">
  <!-- Main -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-4">
    <div class="rp-card">
      <!-- Título -->
      <div class="rp-header-content text-center mb-4">
        <h2 class="fw-bold">Restablecer Contraseña</h2>
        <p class="text-muted">
          Por favor, introduce tu nueva contraseña segura para acceder a JDQ CoreSuite.
        </p>
      </div>
      <form>
        <!-- Nueva contraseña -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Nueva Contraseña</label>
          <div class="input-group rp-input-group">
            <input type="password" class="form-control" placeholder="Mínimo 8 caracteres">
            <button type="button" class="btn btn-outline-secondary">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <!-- Indicador seguridad -->
        <div class="rp-security mb-4">
          <div class="d-flex justify-content-between mb-2">
            <small class="text-uppercase text-muted fw-semibold">
              Seguridad
            </small>
            <small class="text-primary fw-bold">
              Fuerte (85%)
            </small>
          </div>
          <div class="progress rp-progress mb-3">
            <div class="progress-bar" role="progressbar" style="width: 85%;">
            </div>
          </div>
          <div class="row g-2 rp-rules">
            <div class="col-6 valid">
              <i class="bi bi-check-circle-fill"></i> 8+ caracteres
            </div>
            <div class="col-6 valid">
              <i class="bi bi-check-circle-fill"></i> Mayúscula
            </div>
            <div class="col-6 valid">
              <i class="bi bi-check-circle-fill"></i> Número
            </div>
            <div class="col-6 invalid">
              <i class="bi bi-circle"></i> Símbolo
            </div>
          </div>
        </div>
        <!-- Confirmar contraseña -->
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirmar Contraseña</label>
          <div class="input-group rp-input-group">
            <input type="password" class="form-control" placeholder="Repite tu contraseña">
            <button type="button" class="btn btn-outline-secondary">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <!-- Botón -->
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary btn-lg fw-bold">
            Actualizar Contraseña
            <i class="bi bi-arrow-clockwise ms-2"></i>
          </button>
        </div>
        <div class="text-center">
          <a routerLink="/login" class="fw-semibold text-primary">
            Volver al inicio de sesión
          </a>
        </div>
      </form>
    </div>
  </main>
</div>
