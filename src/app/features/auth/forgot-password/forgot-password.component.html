<div class="fp-wrapper d-flex flex-column min-vh-100">
    <!-- Main -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center p-3">
        <div class="fp-card">
            <!-- Título -->
            <div class="mb-4 text-center">
                <h2 class="fw-bold">
                    Olvidé mi contraseña
                </h2>
                <p class="text-muted">
                    Ingresa tu correo para recibir un código y verifícalo a continuación.
                </p>
            </div>
            <form [formGroup]="form" *ngIf="!codeSent">
                <!-- Correo -->
                <div class="mb-4">
                    <label [appRequiredField]="''" class="form-label fw-semibold">
                        Correo electrónico corporativo
                    </label>
                    <div class="input-group login-input-group">
                        <!-- Ícono -->
                        <span class="input-group-text">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <!-- Input -->
                        <input type="email" class="form-control" placeholder="nombre@empresa.com" 
                               formControlName="email" [disabled]="loading">
                        <!-- Botón al lado derecho -->
                        <button type="button" class="btn btn-primary fw-semibold" 
                                (click)="sendCode()" [disabled]="form.invalid || loading">
                            {{ loading ? 'Enviando...' : 'Enviar código' }}
                        </button>
                    </div>
                    <div *ngIf="form.get('email')!.invalid && form.get('email')!.touched" class="text-danger mt-2 small">
                        Ingresa un correo válido
                    </div>
                </div>
            </form>
            <form [formGroup]="codeForm" *ngIf="codeSent">
                <!-- Código -->
                <div class="mb-4">
                    <label [appRequiredField]="''" class="form-label fw-semibold">
                        Código de verificación
                    </label>
                    <div class="d-flex justify-content-between gap-2 fp-code-group">
                        <input type="text" maxlength="1" class="form-control text-center" 
                               #codeInput formControlName="d1" (input)="onCodeInput(0, $event)" [disabled]="loading">
                        <input type="text" maxlength="1" class="form-control text-center" 
                               #codeInput formControlName="d2" (input)="onCodeInput(1, $event)" [disabled]="loading">
                        <input type="text" maxlength="1" class="form-control text-center" 
                               #codeInput formControlName="d3" (input)="onCodeInput(2, $event)" [disabled]="loading">
                        <input type="text" maxlength="1" class="form-control text-center" 
                               #codeInput formControlName="d4" (input)="onCodeInput(3, $event)" [disabled]="loading">
                        <input type="text" maxlength="1" class="form-control text-center" 
                               #codeInput formControlName="d5" (input)="onCodeInput(4, $event)" [disabled]="loading">
                        <input type="text" maxlength="1" class="form-control text-center" 
                               #codeInput formControlName="d6" (input)="onCodeInput(5, $event)" [disabled]="loading">
                    </div>
                </div>
                <!-- Botón verificar -->
                <div class="d-grid mb-3">
                    <button type="button" class="btn btn-primary btn-lg fw-bold" 
                            (click)="verifyCode()" [disabled]="!isCodeComplete() || loading">
                        {{ loading ? 'Verificando...' : 'Verificar' }}
                    </button>
                </div>
                <div class="text-center">
                    <a routerLink="/login" class="fw-semibold text-primary">
                        Volver al inicio de sesión
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>
